name: 🚀 Deploy cloud-mail to Cloudflare Workers

on:
  push:
    branches: [main]
    paths:
      - "mail-worker/**"
      - "mail-vue/**"
  workflow_dispatch:

jobs:
  Deploy-cloud-mail:
    name: 🏗️ Build and Deploy
    runs-on: ubuntu-latest

    env:
      NAME: ${{ secrets.NAME || vars.NAME || 'cloud-mail' }}
      CUSTOM_DOMAIN: ${{ secrets.CUSTOM_DOMAIN || vars.CUSTOM_DOMAIN }}
      DOMAIN: ${{ secrets.DOMAIN || vars.DOMAIN }}
      ADMIN: ${{ secrets.ADMIN || vars.ADMIN }}
      JWT_SECRET: ${{ secrets.JWT_SECRET || vars.JWT_SECRET }}
      CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN || vars.CLOUDFLARE_API_TOKEN }}
      CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID || vars.CLOUDFLARE_ACCOUNT_ID }}
      D1_DATABASE_ID: ${{ secrets.D1_DATABASE_ID || vars.D1_DATABASE_ID }}
      KV_NAMESPACE_ID: ${{ secrets.KV_NAMESPACE_ID || vars.KV_NAMESPACE_ID }}
      R2_BUCKET_NAME: ${{ secrets.R2_BUCKET_NAME || vars.R2_BUCKET_NAME }}
      PROJECT_LINK: ${{ secrets.PROJECT_LINK || vars.PROJECT_LINK }}
      AI_MODEL: ${{ secrets.AI_MODEL || vars.AI_MODEL || '@cf/meta/llama-3.1-8b-instruct' }}
      CLOUDFLARE_EMAIL: ${{ secrets.CF_EMAIL || vars.CF_EMAIL || false }}
      ANALYSIS_CACHE: ${{ secrets.ANALYSIS_CACHE || vars.ANALYSIS_CACHE || false }}
      LINUXDO_CLIENT_ID: ${{ secrets.LINUXDO_CLIENT_ID || vars.LINUXDO_CLIENT_ID }}
      LINUXDO_CLIENT_SECRET: ${{ secrets.LINUXDO_CLIENT_SECRET || vars.LINUXDO_CLIENT_SECRET }}
      LINUXDO_CALLBACK_URL: ${{ secrets.LINUXDO_CALLBACK_URL || vars.LINUXDO_CALLBACK_URL }}
      LINUXDO_SWITCH: ${{ secrets.LINUXDO_SWITCH || vars.LINUXDO_SWITCH }}

    outputs:
      worker_url: ${{ steps.deploy.outputs.worker_url }}

    steps:
      - name: 🚚 Checkout repository
        uses: actions/checkout@v4

      - name: ⚙ Setup pnpm
        uses: pnpm/action-setup@v4.1.0
        with:
          version: 9

      - name: ⚙ Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "24"
          cache: "pnpm"
          cache-dependency-path: "./mail-worker/pnpm-lock.yaml"

      - name: 📦 Install dependencies
        run: pnpm install --frozen-lockfile
        working-directory: ./mail-worker

      - name: 📡 Disable wrangler telemetry
        working-directory: ./mail-worker
        run: pnpm wrangler telemetry disable

      - name: 🛠️ Prepare configuration file
        working-directory: ./mail-worker
        run: |
          set -euo pipefail
          echo "🔐 Preparing wrangler configuration..."

          # 验证必需变量
          if [ -z "$JWT_SECRET" ] || grep -q '[?%#/\\]' <<< "$JWT_SECRET"; then
            echo "❌ JWT_SECRET is empty or contains invalid characters (?, %, #, /, \)."
            exit 1
          fi

          if ! jq -e 'type == "array"' <<< "$DOMAIN" >/dev/null 2>&1; then
            echo "❌ DOMAIN must be a JSON array, e.g., [\"example.com\"]"
            exit 1
          fi

          if [ -z "$ADMIN" ]; then
            echo "❌ ADMIN cannot be empty."
            exit 1
          fi

          if [ -z "$CLOUDFLARE_ACCOUNT_ID" ]; then
            echo "❌ CLOUDFLARE_ACCOUNT_ID cannot be empty."
            exit 1
          fi

          if [ -z "$CLOUDFLARE_API_TOKEN" ]; then
            echo "❌ CLOUDFLARE_API_TOKEN cannot be empty."
            exit 1
          fi

          # 创建基础配置文件（如果不存在）
          CONFIG_FILE="wrangler-action.toml"
          if [ ! -f "$CONFIG_FILE" ]; then
            echo "⚠️ $CONFIG_FILE not found, creating from template..."
            cat > "$CONFIG_FILE" <<'TEMPLATE'
name = "${NAME}"
main = "src/index.ts"
compatibility_date = "2024-12-18"
account_id = "${CLOUDFLARE_ACCOUNT_ID}"

# 占位符，实际由环境变量替换
vars = { DOMAIN = "${DOMAIN}", ADMIN = "${ADMIN}", JWT_SECRET = "${JWT_SECRET}", PROJECT_LINK = "${PROJECT_LINK}", ANALYSIS_CACHE = "${ANALYSIS_CACHE}", AI_MODEL = "${AI_MODEL}", LINUXDO_CLIENT_ID = "${LINUXDO_CLIENT_ID}", LINUXDO_CLIENT_SECRET = "${LINUXDO_CLIENT_SECRET}", LINUXDO_CALLBACK_URL = "${LINUXDO_CALLBACK_URL}", LINUXDO_SWITCH = "${LINUXDO_SWITCH}" }

[[kv_namespaces]]
binding = "KV"
id = "${KV_NAMESPACE_ID}"

[[d1_databases]]
binding = "DB"
database_id = "${D1_DATABASE_ID}"

[[r2_buckets]]
binding = "R2"
bucket_name = "${R2_BUCKET_NAME}"

[[routes]]
pattern = "${CUSTOM_DOMAIN}"
custom_domain = true

project_link = "${PROJECT_LINK}"

[[send_email]]
name = "email"
TEMPLATE
          fi

          # 使用 envsubst 进行安全替换（需要先安装 gettext-base）
          sudo apt-get update -qq && sudo apt-get install -y -qq gettext-base > /dev/null
          envsubst < "$CONFIG_FILE" > "$CONFIG_FILE.tmp" && mv "$CONFIG_FILE.tmp" "$CONFIG_FILE"

          # 移除未配置的区块（R2, routes, send_email, linuxdo）
          if [ -z "$R2_BUCKET_NAME" ]; then
            sed -i '/\[\[r2_buckets\]\]/,/^$/d' "$CONFIG_FILE"
          fi

          if [ -z "$CUSTOM_DOMAIN" ]; then
            sed -i '/\[\[routes\]\]/,/^$/d' "$CONFIG_FILE"
          fi

          if [ -z "$LINUXDO_CLIENT_ID" ] || [ -z "$LINUXDO_CLIENT_SECRET" ]; then
            sed -i '/^LINUXDO_CLIENT_ID = /,/^LINUXDO_SWITCH = /d' "$CONFIG_FILE"
          fi

          if [ "${CLOUDFLARE_EMAIL,,}" != "true" ]; then
            sed -i '/\[\[send_email\]\]/,/^$/d' "$CONFIG_FILE"
          fi

          # 清理可能留下的空变量占位符（值为空时可能显示为 ""）
          sed -i 's/""//g' "$CONFIG_FILE"

          echo "✅ Configuration ready: $CONFIG_FILE"

      - name: ⚡ Setup KV namespace
        working-directory: ./mail-worker
        run: |
          set -euo pipefail
          CONFIG_FILE="wrangler-action.toml"

          if [ -n "$KV_NAMESPACE_ID" ]; then
            echo "✅ Using provided KV_NAMESPACE_ID"
            sed -i "s|\${KV_NAMESPACE_ID}|$KV_NAMESPACE_ID|g" "$CONFIG_FILE"
            exit 0
          fi

          echo "🔍 Checking for existing KV namespace '$NAME'..."
          if pnpm wrangler kv namespace list --json 2>/dev/null | jq -e ".[] | select(.title == \"$NAME\")" >/dev/null; then
            KV_ID=$(pnpm wrangler kv namespace list --json | jq -r ".[] | select(.title == \"$NAME\") | .id")
            echo "✅ Found existing KV namespace with ID: $KV_ID"
          else
            echo "⚠️ Creating new KV namespace '$NAME'..."
            pnpm wrangler kv namespace create "$NAME" --json > kv-create.json
            KV_ID=$(jq -r '.id' kv-create.json)
            echo "✅ Created KV namespace with ID: $KV_ID"
          fi

          sed -i "s|\${KV_NAMESPACE_ID}|$KV_ID|g" "$CONFIG_FILE"

      - name: 🐬 Setup D1 database
        working-directory: ./mail-worker
        run: |
          set -euo pipefail
          CONFIG_FILE="wrangler-action.toml"

          if [ -n "$D1_DATABASE_ID" ]; then
            echo "✅ Using provided D1_DATABASE_ID"
            sed -i "s|\${D1_DATABASE_ID}|$D1_DATABASE_ID|g" "$CONFIG_FILE"
            exit 0
          fi

          echo "🔍 Checking for existing D1 database '$NAME'..."
          if pnpm wrangler d1 list --json 2>/dev/null | jq -e ".[] | select(.name == \"$NAME\")" >/dev/null; then
            D1_ID=$(pnpm wrangler d1 list --json | jq -r ".[] | select(.name == \"$NAME\") | .uuid")
            echo "✅ Found existing D1 database with ID: $D1_ID"
          else
            echo "⚠️ Creating new D1 database '$NAME'..."
            pnpm wrangler d1 create "$NAME" --json > d1-create.json
            D1_ID=$(jq -r '.uuid' d1-create.json)
            echo "✅ Created D1 database with ID: $D1_ID"
          fi

          sed -i "s|\${D1_DATABASE_ID}|$D1_ID|g" "$CONFIG_FILE"

      - name: 🚀 Deploy to Cloudflare Workers
        id: deploy
        working-directory: ./mail-worker
        run: |
          set -euo pipefail
          echo "🚀 Starting deployment..."
          DEPLOY_LOG="deploy.log"

          # 执行部署，隐藏敏感信息
          pnpm wrangler deploy -c wrangler-action.toml 2>&1 | tee "$DEPLOY_LOG" | \
            grep -vE 'https?://[^ ]*\.workers\.dev|api_token|secret' || true

          DEPLOY_EXIT_CODE=${PIPESTATUS[0]}
          if [ $DEPLOY_EXIT_CODE -ne 0 ]; then
            echo "❌ Deployment failed (exit code $DEPLOY_EXIT_CODE)"
            exit 1
          fi

          WORKER_URL=$(grep -oE 'https?://[^ ]*\.workers\.dev' "$DEPLOY_LOG" | head -1 || echo "")
          if [ -n "$WORKER_URL" ]; then
            echo "::add-mask::$WORKER_URL"
            echo "worker_url=$WORKER_URL" >> $GITHUB_OUTPUT
            echo "✅ Deployment successful: worker URL masked"
          else
            echo "::warning::No workers.dev URL found (custom domain may be used)"
            echo "worker_url=" >> $GITHUB_OUTPUT
          fi

      - name: ♻️ Initialize database (with retry)
        run: |
          set -euo pipefail
          echo "🛠️ Waiting for worker to become ready..."

          # 确定最终的访问 URL
          if [ -n "$CUSTOM_DOMAIN" ]; then
            BASE_URL="https://$CUSTOM_DOMAIN"
          else
            BASE_URL="${{ steps.deploy.outputs.worker_url }}"
          fi

          if [ -z "$BASE_URL" ]; then
            echo "❌ No deployment URL available. Set CUSTOM_DOMAIN or ensure workers.dev URL is captured."
            exit 1
          fi

          INIT_URL="$BASE_URL/api/init/${JWT_SECRET}"
          echo "Initialization endpoint: $INIT_URL" | sed 's/\/[^/]*$/\/***/'

          # 重试最多 10 次，每次等待 5 秒
          for i in {1..10}; do
            echo "Attempt $i/10..."
            HTTP_CODE=$(curl -sL -w "%{http_code}" -o response.txt "$INIT_URL")
            RESPONSE_BODY=$(cat response.txt)

            if [ "$RESPONSE_BODY" = "success" ]; then
              echo "✅ Database initialized successfully."
              exit 0
            else
              echo "  HTTP $HTTP_CODE, response: $RESPONSE_BODY"
              if [ $i -lt 10 ]; then
                sleep 5
              fi
            fi
          done

          echo "❌ Failed to initialize database after multiple attempts."
          exit 1

      # 可选：清理旧的 workflow runs（改为使用 GitHub CLI，无需第三方 action）
      - name: 🗑️ Delete old workflow runs (optional)
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        continue-on-error: true
        run: |
          echo "🧹 Cleaning up old workflow runs (keeping latest 10)..."
          # 使用 gh 命令列出并删除旧 runs
          gh api repos/${{ github.repository }}/actions/runs \
            --paginate \
            -q '.workflow_runs | sort_by(.run_number) | reverse | .[10:][] | .id' \
            | xargs -I {} gh api -X DELETE repos/${{ github.repository }}/actions/runs/{}
        env:
          GH_TOKEN: ${{ github.token }}
